- name: Instala o pacotes necessarios para o OBS - Linux
  ansible.builtin.apt:
    pkg:
      - ffmpeg
      - obs-studio
  when: ansible_distribution == 'Debian'

- name: Instalar OBS studio no Windows
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ item }}"
    state: present
    loop:
      - obs-studio
      - openshot
  when: ansible_os_family == 'Windows'
