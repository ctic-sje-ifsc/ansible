#Windows
## Codigo nao testado

- name: Verifica se EnergyPlus 26.1.0 já está instalado
  win_stat:
    path: C:\EnergyPlusV26-1-0
  register: energyplus_installed

- name: Procura versões instaladas do EnergyPlus
  win_find:
    paths: C:\
    patterns: EnergyPlusV*
    file_type: directory
  register: energyplus_dirs
  when:
    - ansible_os_family == 'Windows'
    - not energyplus_installed.stat.exists

- name: Verifica se existe desinstalador nas versões encontradas
  win_stat:
    path: "{{ item.path }}\\Uninstall.exe"
  loop: "{{ energyplus_dirs.files }}"
  register: uninstallers
  when:
    - ansible_os_family == 'Windows'
    - not energyplus_installed.stat.exists

- name: Desinstala versões antigas do EnergyPlus
  win_command: '"{{ item.item.path }}\Uninstall.exe" /S'
  loop: "{{ uninstallers.results }}"
  when:
    - ansible_os_family == 'Windows'
    - not energyplus_installed.stat.exists
    - item.stat.exists
    - item.item.path != 'C:\EnergyPlusV26-1-0'

- name: Baixa o EnergyPlus 26.1.0
  win_get_url:
    url: https://github.com/NatLabRockies/EnergyPlus/releases/download/v26.1.0/EnergyPlus-26.1.0-6f2e40d102-Windows-x86_64.exe
    dest: C:\instaladores\EnergyPlus-26.1.0-6f2e40d102-Windows-x86_64.exe
  when:
    - ansible_os_family == 'Windows'
    - not energyplus_installed.stat.exists

- name: Instala o EnergyPlus 26.1.0
  win_package:
    path: C:\instaladores\EnergyPlus-26.1.0-6f2e40d102-Windows-x86_64.exe
    arguments: /S
    product_id: 'EnergyPlusV 26.1.0-6f2e40d102'
    state: present
  when:
    - ansible_os_family == 'Windows'
    - not energyplus_installed.stat.exists

